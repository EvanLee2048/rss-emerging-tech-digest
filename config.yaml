# RSS Emerging Tech Digest — Configuration
# All values can be overridden via environment variables.

# ── LLM API Configuration ──────────────────────────────────────────
# LLM_API_KEY is required. Set in environment or here.
# llm_api_key: "sk-..."

# API base URL (defaults to https://api.deepseek.com/v1)
# llm_base_url: "https://api.deepseek.com/v1"

# Model name (defaults to deepseek-v4-flash)
# llm_model: "deepseek-v4-flash"

# ── Pipeline Settings ─────────────────────────────────────────────
# Category filter: all, ai, cyber, fintech, web3, hkma
# category: "all"

# State directory for watermark files (URL dedup)
# state_dir: "~/.digest-state/"

# HTTP timeout in seconds
# timeout: 30

# Output file path (leave empty to print to stdout)
# output: ""

# ── Email Delivery Configuration ──────────────────────────────────
# SMTP server for emailing the digest
# smtp_host: "smtp.whatevermail.com"
# smtp_port: 465
# smtp_user: "your-email@whatevermail.com"
# smtp_password: "your-auth-code"
# smtp_from: "your-email@whatevermail.com"
# smtp_target: "recipient@example.com"
